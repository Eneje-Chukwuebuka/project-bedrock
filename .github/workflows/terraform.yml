name: Terraform CI/CD

"on":
  push:
    branches:
      - main
    paths:
      - 'terraform/**'
  pull_request:
    branches:
      - main
    paths:
      - 'terraform/**'

env:
  TF_VERSION: '1.14.7'
  AWS_REGION: 'us-east-1'

jobs:
  terraform-plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform Init
        working-directory: terraform
        run: terraform init

      - name: Terraform Plan
        working-directory: terraform
        run: terraform plan -no-color 2>&1 | tee plan_output.txt
        env:
          TF_VAR_region: ${{ env.AWS_REGION }}
          TF_VAR_project_name: "project-bedrock"
          TF_VAR_vpc_cidr: "10.0.0.0/16"
          TF_VAR_public_subnet_cidrs: '["10.0.1.0/24","10.0.2.0/24"]'
          TF_VAR_private_subnet_cidrs: '["10.0.11.0/24","10.0.12.0/24"]'
          TF_VAR_availability_zones: '["us-east-1a","us-east-1b"]'
          TF_VAR_eks_cluster_version: "1.34"
          TF_VAR_eks_node_instance_type: "t3.small"
          TF_VAR_eks_node_desired_size: "2"
          TF_VAR_eks_node_min_size: "1"
          TF_VAR_eks_node_max_size: "3"
          TF_VAR_rds_instance_class: "db.t3.micro"
          TF_VAR_rds_mysql_db_name: "retailstore"
          TF_VAR_rds_postgres_db_name: "retailstore"
          TF_VAR_student_id: "394747153553-v2"
          TF_VAR_tags: '{"Project":"karatu-2025-capstone"}'

      - name: Post Plan as PR Comment
        uses: actions/github-script@v7
        if: always()
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('terraform/plan_output.txt', 'utf8');
            const truncated = plan.length > 60000 ? plan.substring(0, 60000) + '\n... truncated' : plan;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## Terraform Plan\n\`\`\`hcl\n${truncated}\n\`\`\``
            });

  terraform-apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform Init
        working-directory: terraform
        run: terraform init

      - name: Terraform Apply
        working-directory: terraform
        run: terraform apply -auto-approve -no-color
        env:
          TF_VAR_region: ${{ env.AWS_REGION }}
          TF_VAR_project_name: "project-bedrock"
          TF_VAR_vpc_cidr: "10.0.0.0/16"
          TF_VAR_public_subnet_cidrs: '["10.0.1.0/24","10.0.2.0/24"]'
          TF_VAR_private_subnet_cidrs: '["10.0.11.0/24","10.0.12.0/24"]'
          TF_VAR_availability_zones: '["us-east-1a","us-east-1b"]'
          TF_VAR_eks_cluster_version: "1.34"
          TF_VAR_eks_node_instance_type: "t3.small"
          TF_VAR_eks_node_desired_size: "2"
          TF_VAR_eks_node_min_size: "1"
          TF_VAR_eks_node_max_size: "3"
          TF_VAR_rds_instance_class: "db.t3.micro"
          TF_VAR_rds_mysql_db_name: "retailstore"
          TF_VAR_rds_postgres_db_name: "retailstore"
          TF_VAR_student_id: "394747153553-v2"
          TF_VAR_tags: '{"Project":"karatu-2025-capstone"}'
