name: Deploy Application

"on":
  push:
    branches:
      - main
    paths:
      - 'kubernetes/v2/**'
      - '.github/workflows/deploy-app.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'kubernetes/v2/**'
      - '.github/workflows/deploy-app.yml'

env:
  AWS_REGION: 'us-east-1'
  CLUSTER_NAME: 'project-bedrock-cluster'
  NAMESPACE: 'retail-app-v2'

jobs:
  helm-validate:
    name: Helm Validate (dry-run)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Helm
        uses: azure/setup-helm@v4
        with:
          version: 'v3.15.2'
      - name: Validate charts render (catalog, orders, carts)
        run: |
          helm template catalog oci://public.ecr.aws/aws-containers/retail-store-sample-catalog-chart \
            -f kubernetes/v2/catalog-values.yaml --set app.persistence.secret.password=dummy > /dev/null
          helm template orders oci://public.ecr.aws/aws-containers/retail-store-sample-orders-chart \
            -f kubernetes/v2/orders-values.yaml --set app.persistence.secret.password=dummy > /dev/null
          helm template carts oci://public.ecr.aws/aws-containers/retail-store-sample-cart-chart \
            -f kubernetes/v2/carts-values.yaml > /dev/null
          echo "All 1.6.1 per-service charts render successfully."

  helm-deploy:
    name: Helm Deploy (live)
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Setup Helm
        uses: azure/setup-helm@v4
        with:
          version: 'v3.15.2'
      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name ${{ env.CLUSTER_NAME }} --region ${{ env.AWS_REGION }}
      - name: Fetch DB passwords from Secrets Manager
        id: secrets
        run: |
          MYSQL_PW=$(aws secretsmanager get-secret-value --secret-id project-bedrock/rds/mysql --query 'SecretString' --output text | python3 -c "import sys,json;print(json.load(sys.stdin)['password'])")
          PG_PW=$(aws secretsmanager get-secret-value --secret-id project-bedrock/rds/postgres --query 'SecretString' --output text | python3 -c "import sys,json;print(json.load(sys.stdin)['password'])")
          echo "::add-mask::$MYSQL_PW"
          echo "::add-mask::$PG_PW"
          echo "mysql_pw=$MYSQL_PW" >> "$GITHUB_OUTPUT"
          echo "pg_pw=$PG_PW" >> "$GITHUB_OUTPUT"
      - name: Deploy stateless services
        run: |
          helm upgrade --install assets oci://public.ecr.aws/aws-containers/retail-store-sample-assets-chart \
            -n ${{ env.NAMESPACE }} --create-namespace --wait --timeout 5m
          helm upgrade --install checkout oci://public.ecr.aws/aws-containers/retail-store-sample-checkout-chart \
            -n ${{ env.NAMESPACE }} --wait --timeout 5m
      - name: Deploy catalog (RDS MySQL)
        run: |
          helm upgrade --install catalog oci://public.ecr.aws/aws-containers/retail-store-sample-catalog-chart \
            -n ${{ env.NAMESPACE }} -f kubernetes/v2/catalog-values.yaml \
            --set "app.persistence.secret.password=${{ steps.secrets.outputs.mysql_pw }}" \
            --wait --timeout 5m
      - name: Deploy orders (RDS PostgreSQL)
        run: |
          helm upgrade --install orders oci://public.ecr.aws/aws-containers/retail-store-sample-orders-chart \
            -n ${{ env.NAMESPACE }} -f kubernetes/v2/orders-values.yaml \
            --set "app.persistence.secret.password=${{ steps.secrets.outputs.pg_pw }}" \
            --wait --timeout 5m
      - name: Deploy carts (DynamoDB via IRSA)
        run: |
          helm upgrade --install carts oci://public.ecr.aws/aws-containers/retail-store-sample-cart-chart \
            -n ${{ env.NAMESPACE }} -f kubernetes/v2/carts-values.yaml \
            --wait --timeout 5m
      - name: Deploy UI (wired to backend services)
        run: |
          helm upgrade --install ui oci://public.ecr.aws/aws-containers/retail-store-sample-ui-chart \
            -n ${{ env.NAMESPACE }} \
            --set 'app.endpoints.catalog=http://catalog:80' \
            --set 'app.endpoints.carts=http://carts:80' \
            --set 'app.endpoints.orders=http://orders:80' \
            --set 'app.endpoints.checkout=http://checkout:80' \
            --wait --timeout 5m
      - name: Apply ingress
        run: kubectl apply -f kubernetes/v2/ingress.yaml
      - name: Verify deployment
        run: |
          kubectl get pods -n ${{ env.NAMESPACE }}
          kubectl get ingress -n ${{ env.NAMESPACE }}
